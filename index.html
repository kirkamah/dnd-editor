<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/brand/logo.png" />
    <title>DnD Editor</title>
  </head>
  <body>
    <div id="welcome">
      <img src="/brand/logo.svg" alt="no harm org" width="72" height="72" />
      <h1>DnD Editor</h1>
      <p class="hint" id="welcome-sub"></p>
      <button id="open-btn2" class="accent" data-i18n="openSession">Открыть сессию</button>
      <p class="hint" id="ffmpeg-status-w"></p>
    </div>

    <div id="workspace" class="hidden">
      <div id="topbar">
        <button id="open-btn" data-i18n="open">Открыть</button>
        <button id="save-btn" data-i18n="save">Сохранить</button>
        <button id="saveas-btn" data-i18n="saveAs">Сохранить как</button>
        <span class="sep"></span>
        <button id="scene-btn" data-i18n="sceneProps">Сцена</button>
        <button id="add-cue-btn" data-i18n="addCue">+ Ключ</button>
        <button id="add-music-btn" data-i18n="addMusic">+ Музыка</button>
        <button id="add-overlay-btn" data-i18n="addOverlay">+ Картинка</button>
        <span class="sep"></span>
        <button id="export-btn" class="accent" data-i18n="export">Экспорт</button>
        <button id="settings-btn" data-i18n="settings">⚙ Настройки</button>
        <span id="ffmpeg-status" class="status"></span>
      </div>

      <div id="middle">
        <div id="preview-wrap"><canvas id="preview"></canvas></div>
        <div id="inspector"></div>
      </div>

      <div id="transport">
        <button id="play-btn" title="Play/Pause">▶</button>
        <span id="timecode">00:00.00 / 00:00</span>
        <span class="sep"></span>
        <button id="zoom-out" title="−">−</button>
        <button id="zoom-in" title="=">+</button>
        <button id="zoom-fit" data-i18n-title="zoomFit">⟷</button>
        <span class="sep"></span>
        <button id="hotkeys-btn" data-i18n="hotkeys">⌨ Клавиши</button>
        <span class="hint" data-i18n="hintTimeline"></span>
      </div>

      <div id="timeline-wrap">
        <div id="track-headers"></div>
        <div id="timeline-scroll">
          <div id="timeline-spacer"><canvas id="timeline"></canvas></div>
        </div>
      </div>
    </div>

    <div id="export-modal" class="hidden">
      <div class="modal-box">
        <h2 data-i18n="exportTitle">Экспорт</h2>
        <div id="export-choices">
          <button id="export-video" class="accent" data-i18n="exportVideo"></button>
          <button id="export-ae" data-i18n="exportAE"></button>
          <button id="export-both" data-i18n="exportBoth"></button>
        </div>
        <div id="export-progress" class="hidden">
          <p id="export-phase">…</p>
          <progress id="export-bar" max="1" value="0"></progress>
          <button id="export-cancel" class="danger" data-i18n="cancel"></button>
        </div>
        <button id="export-close" class="close">✕</button>
      </div>
    </div>

    <div id="settings-modal" class="hidden">
      <div class="modal-box">
        <h2 data-i18n="settingsTitle">Настройки</h2>
        <div id="settings-body"></div>
        <button id="settings-close" class="close">✕</button>
      </div>
    </div>

    <div id="hotkeys-modal" class="hidden">
      <div class="modal-box">
        <h2 data-i18n="hotkeysTitle">Горячие клавиши</h2>
        <div id="hotkeys-body"></div>
        <button id="hotkeys-close" class="close">✕</button>
      </div>
    </div>

    <div id="toast"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
